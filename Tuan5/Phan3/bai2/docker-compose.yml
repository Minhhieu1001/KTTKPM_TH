services:
  mongo:
    image: mongo:latest
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  node-app:
    build: ./app
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/notesdb
    ports:
      - "3000:3000"
    networks:
      - app_net

volumes:
  mongo_data:

networks:
  app_net:
    driver: bridge
